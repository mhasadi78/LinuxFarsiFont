<?xml version='1.0'?>
<!DOCTYPE fontconfig SYSTEM 'urn:fontconfig:fonts.dtd'>
<fontconfig>
  <!-- Set Sahel as default for all sans-serif contexts -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>Sahel</family>
    </prefer>
  </alias>

  <!-- Also cover common generic names -->
  <alias>
    <family>sans</family>
    <prefer>
      <family>Sahel</family>
    </prefer>
  </alias>

  <alias>
    <family>system-ui</family>
    <prefer>
      <family>Sahel</family>
    </prefer>
  </alias>

  <!-- Force Sahel for Persian and Arabic -->
  <match target="pattern">
    <test qual="any" name="lang" compare="contains">
      <string>fa</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Sahel</string>
    </edit>
  </match>

  <match target="pattern">
    <test qual="any" name="lang" compare="contains">
      <string>ar</string>
    </test>
    <edit name="family" mode="prepend" binding="strong">
      <string>Sahel</string>
    </edit>
  </match>

  <!-- Force Sahel for all patterns (as fallback) -->
  <match target="pattern">
    <edit name="family" mode="append" binding="strong">
      <string>Sahel</string>
    </edit>
  </match>

  <!-- Rendering settings -->
  <match target="font">
    <edit mode="assign" name="hinting">
      <bool>true</bool>
    </edit>
  </match>

  <match target="font">
    <edit mode="assign" name="hintstyle">
      <const>hintslight</const>
    </edit>
  </match>

  <match target="font">
    <edit mode="assign" name="antialias">
      <bool>true</bool>
    </edit>
  </match>
</fontconfig>
